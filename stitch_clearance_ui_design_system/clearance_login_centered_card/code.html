<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Geist+Sans:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Geist Sans', sans-serif;
            background-color: #0B0F14; /* Brand Level 0 Base */
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .auth-card {
            background-color: #141A22; /* Brand Level 1 Surface */
            border: 1px solid #243044;
        }
        .input-field {
            background-color: #0B0F14;
            border-color: #243044;
        }
        .input-field:focus {
            border-color: #2DD4BF;
            box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.2);
            outline: none;
        }
        /* Atmospheric background effect */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(45, 212, 191, 0.03) 0%, rgba(11, 15, 20, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "brand-bg": "#0B0F14",
                    "brand-surface": "#141A22",
                    "brand-border": "#243044",
                    "brand-text": "#E8EDF4",
                    "brand-muted": "#8B9CB3",
                    "brand-teal": "#2DD4BF",
                    "brand-warning": "#F59E0B",
                    "brand-danger": "#EF4444",
                    "brand-success": "#22C55E",
                "surface-tint": "#3cddc7",
                "tertiary-fixed": "#ffdcc0",
                "on-primary-fixed": "#00201c",
                "surface-variant": "#253649",
                "surface-container-lowest": "#000f20",
                "surface": "#031426",
                "on-primary": "#003731",
                "error-container": "#93000a",
                "surface-container": "#0f2133",
                "secondary-fixed-dim": "#c1c7d2",
                "secondary": "#c1c7d2",
                "primary-fixed": "#62fae3",
                "on-primary-container": "#00574d",
                "tertiary-container": "#ffac5a",
                "on-error": "#690005",
                "inverse-surface": "#d3e4fd",
                "on-tertiary-fixed-variant": "#6b3b00",
                "primary": "#2DD4BF",
                "tertiary-fixed-dim": "#ffb875",
                "secondary-container": "#464c55",
                "on-surface": "#d3e4fd",
                "on-secondary-fixed": "#161c24",
                "primary-fixed-dim": "#3cddc7",
                "outline-variant": "#3c4a46",
                "surface-bright": "#2a3a4e",
                "secondary-fixed": "#dde3ee",
                "on-tertiary": "#4b2800",
                "inverse-on-surface": "#213245",
                "surface-container-highest": "#253649",
                "error": "#ffb4ab",
                "on-tertiary-fixed": "#2d1600",
                "surface-dim": "#031426",
                "outline": "#859490",
                "on-surface-variant": "#bacac5",
                "on-primary-fixed-variant": "#005047",
                "on-secondary-container": "#b6bcc7",
                "tertiary": "#ffd1aa",
                "on-tertiary-container": "#744000",
                "surface-container-high": "#1a2b3e",
                "primary-container": "#2dd4bf",
                "background": "#031426",
                "on-background": "#d3e4fd",
                "surface-container-low": "#0b1d2f",
                "inverse-primary": "#006b5f",
                "on-secondary-fixed-variant": "#414750",
                "on-secondary": "#2b3139",
                "on-error-container": "#ffdad6"
            },
            "spacing": {
                "xs": "4px", "sm": "8px", "gutter": "16px", "unit": "8px", "margin-desktop": "24px", "xl": "32px", "lg": "24px", "margin-mobile": "16px", "md": "16px"
            },
            "fontFamily": {
                "headline-md": ["Geist Sans"], "label-md": ["Geist Sans"], "body-lg": ["Geist Sans"], "headline-lg": ["Geist Sans"], "body-sm": ["Geist Sans"], "body-md": ["Geist Sans"]
            },
            "fontSize": {
                "headline-md": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                "body-lg": ["15px", {"lineHeight": "24px", "fontWeight": "400"}],
                "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
</head>
<body class="flex items-center justify-center min-h-screen relative">
<!-- Atmospheric Background Elements -->
<div class="ambient-glow top-[-200px] left-[-200px]"></div>
<div class="ambient-glow bottom-[-200px] right-[-200px]"></div>
<!-- Hidden Main Nav (Suppressed per Filter Logic for Transactional Screen) -->
<main class="z-10 w-full max-w-[400px] px-margin-mobile">
<div class="auth-card rounded-lg p-xl flex flex-col gap-lg shadow-2xl">
<!-- Branding & Header -->
<div class="flex flex-col items-center gap-md">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
<span class="font-headline-lg text-headline-lg font-bold text-on-background tracking-tighter">Clearance</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Sign in to Clearance</h1>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-lg" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-xs" for="email">Email address</label>
<input class="input-field w-full h-11 px-md rounded-lg text-on-surface font-body-md placeholder:text-outline-variant transition-all duration-200" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline cursor-pointer" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="input-field w-full h-11 pl-md pr-11 rounded-lg text-on-surface font-body-md placeholder:text-outline-variant transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="pass-icon">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full h-11 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-sm" type="submit">
                    Sign in
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md">
<div class="h-[1px] flex-1 bg-surface-variant"></div>
<span class="font-label-md text-label-md text-outline-variant">OR</span>
<div class="h-[1px] flex-1 bg-surface-variant"></div>
</div>
<!-- Social Provider -->
<button class="w-full h-11 border border-surface-variant text-on-surface font-body-md rounded-lg hover:bg-surface-container-high active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-sm">
<svg height="18" viewbox="0 0 18 18" width="18">
<path d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"></path>
<path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853"></path>
<path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957275C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"></path>
<path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<!-- Card Footer -->
<div class="mt-md pt-lg border-t border-surface-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Create account</a>
</p>
</div>
</div>
<!-- System Status Indicator -->
<div class="mt-lg flex justify-center items-center gap-sm opacity-50">
<span class="w-2 h-2 rounded-full bg-primary-fixed"></span>
<span class="font-label-md text-label-md text-on-surface-variant">All systems operational</span>
</div>
</main>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('pass-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Mouse follow effect for the ambient glow
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            // Slightly move the glow based on cursor position
            const glows = document.querySelectorAll('.ambient-glow');
            glows.forEach((glow, index) => {
                const modifier = index === 0 ? 0.05 : -0.05;
                const tx = (x - window.innerWidth / 2) * modifier;
                const ty = (y - window.innerHeight / 2) * modifier;
                glow.style.transform = `translate(${tx}px, ${ty}px)`;
            });
        });
    </script>
</body></html>
